apiVersion: v1
kind: ServiceAccount
metadata:
  name: kyverno-resync-wildcard-crt
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-resync-wildcard-crt
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-resync-wildcard-crt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-resync-wildcard-crt
subjects:
- kind: ServiceAccount
  name: kyverno-resync-wildcard-crt
  namespace: cert-manager
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kyverno-resync-wildcard-crt
  namespace: cert-manager
spec:
  schedule: "0 3 * * 1"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: kyverno-resync-wildcard-crt
          restartPolicy: OnFailure
          containers:
          - name: resync
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "Annotating namespaces with label cert=wildcard to trigger Kyverno re-sync..."
              NAMESPACES=$(kubectl get ns -l cert=wildcard -o jsonpath='{.items[*].metadata.name}')
              TOTAL=0
              for ns in $NAMESPACES; do
                kubectl annotate ns "$ns" kyverno-resync="$(date +%s)" --overwrite
                echo "  annotated: $ns"
                TOTAL=$((TOTAL+1))
              done
              echo "Done. $TOTAL namespaces annotated."
