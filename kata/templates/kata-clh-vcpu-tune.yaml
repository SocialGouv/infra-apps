# kata-clh vCPU floor for NESTED virtualization (e.g. OVH MKS).
#
# Why: with the shipped default of 1 vCPU, the kata-agent in the guest is too slow to answer
# containerd's CRI `get state` query under nested virt — containerd hits `context deadline exceeded`
# and the kubelet kills the sandbox (VMs loop every ~20-80s). Bumping the guest to 4 vCPUs (+ 4 GiB)
# makes the agent responsive enough and the VM stable. Kata reads its config PER-SANDBOX, so no
# containerd restart is needed; the next pod just picks up the new value.
#
# ALSO enables virtiofsd xattr support (`--xattr` in virtio_fs_extra_args): without it every xattr
# syscall on the guest's virtiofs-backed mounts (the PVC-backed buildkit snapshots of the UNTRUSTED
# fork daemons) returns ENOTSUP — buildkit's content hashing llistxattr's every file, so any real
# build (COPY of a directory) fails with "failed to create hash for <path>: operation not supported".
# Like the vCPU floor, the config is read per-sandbox: the next VM picks it up, no restart needed.
#
# This DaemonSet keeps `default_vcpus`/`default_memory`/`virtio_fs_extra_args` patched on every kata
# node (idempotent, and re-applied periodically so a kata-deploy upgrade that rewrites the defaults
# gets corrected). It is scoped to nodes kata-deploy has finished installing on (label
# katacontainers.io/kata-runtime=true), runs privileged for the hostPath, and only edits the
# kata-clh config files.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-clh-vcpu-tune
  namespace: buildkit-system
  labels: { app: kata-clh-vcpu-tune }
spec:
  selector:
    matchLabels: { app: kata-clh-vcpu-tune }
  template:
    metadata:
      labels: { app: kata-clh-vcpu-tune }
    spec:
      # Only kata-installed nodes; tolerate any taint so we land on the dedicated build pool.
      nodeSelector:
        katacontainers.io/kata-runtime: "true"
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: tune
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              while true; do
                for C in /host/opt/kata/share/defaults/kata-containers/runtimes/clh/configuration-clh.toml \
                         /host/opt/kata/share/defaults/kata-containers/configuration-clh.toml; do
                  [ -f "$C" ] || continue
                  sed -i 's/^default_vcpus = 1$/default_vcpus = 4/; s/^default_memory = 2048$/default_memory = 4096/' "$C"
                  # virtiofsd xattr: buildkit hashes every file with llistxattr; without --xattr
                  # the guest fs answers ENOTSUP and every untrusted (Kata) build fails.
                  sed -i '/^virtio_fs_extra_args = \[\]/ s/\[\]/["--xattr"]/' "$C"
                  sed -i '/^virtio_fs_extra_args = /{ /--xattr/! s/\]$/, "--xattr"]/ }' "$C"
                  echo "$(date -u +%FT%TZ) tuned $C -> $(grep -hE '^default_vcpus|^default_memory|^virtio_fs_extra_args' "$C" | tr '\n' ' ')"
                done
                sleep 600
              done
          resources:
            requests: { cpu: 5m, memory: 8Mi }
            limits: { cpu: 50m, memory: 32Mi }
          volumeMounts:
            - { name: kata, mountPath: /host/opt/kata }
      volumes:
        - name: kata
          hostPath: { path: /opt/kata }
