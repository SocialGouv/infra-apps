kuik:
  manager:
    replicas: 2
    pdb:
      create: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: kuik
            app.kubernetes.io/component: manager
    webhook:
      # Opt-in selector: only namespaces explicitly labelled kuik.enix.io/enabled=true
      # are mutated. Webhook rewrites Job pod images to the in-cluster registry, but
      # OVH managed K8s containerd cannot pull plain-HTTP from it — see C debug.
      namespaceSelector:
        matchLabels:
          kuik.enix.io/enabled: "true"

registry:
  replicaCount: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  persistence:
    enabled: true
    accessMode: ReadWriteMany
    size: 100Gi
    storageClass: openebs-nfs-hspeed
  podDisruptionBudget:
    minAvailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  garbageCollect:
    enabled: true
    deleteUntagged: true
    schedule: "0 3 * * 0"
