apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-image-keeper
spec:
  generators:
    - list:
        elements:
          - name: kube-image-keeper-dev
            cluster: ovh-dev
          - name: kube-image-keeper-prod
            cluster: ovh-prod
          # Not deployed on tools:
          # - Harbor runs on tools, so kuik→Harbor routing would be circular
          # - During tools upgrade, Harbor moves → rewriting to Harbor would amplify outages
          # See charts/kube-image-keeper/README.md for details.
  goTemplate: true
  template:
    metadata:
      name: "{{ .name }}"
    spec:
      destination:
        name: "{{ .cluster }}"
        namespace: "kuik-system"
      project: default
      source:
        repoURL: https://github.com/SocialGouv/infra-apps.git
        targetRevision: master
        path: charts/kube-image-keeper
        helm:
          releaseName: kube-image-keeper
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
