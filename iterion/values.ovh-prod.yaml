# iterion @ ovh-prod — HA cloud overlay (overrides values.yaml, loaded after it).
#
# Datastores (off Bitnami subcharts, onto community/official charts at the
# umbrella level):
#   - mongodb: groundhog2k/mongodb 0.7.8, RS3 (1 primary + 2 secondaries).
#     Values live at top-level `mongodb:` (umbrella dep), distinct from the
#     bundled Bitnami subchart at `iterion.mongodb` which is disabled below.
#     Auth comes from the SealedSecret `iterion-mongodb-creds` (env-secret
#     wired via `mongodb.extraEnvSecrets:`, which the chart turns into an
#     `envFrom: secretRef` on the mongod container — keys
#     MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD).
#   - minio: official minio/minio 5.4.0, DISTRIBUTED HA (4 nodes, 1 drive each,
#     erasure-coded). Values at top-level `minio:`. Root creds come from the
#     SealedSecret `iterion-minio-creds` (keys `rootUser` / `rootPassword`)
#     via `minio.existingSecret`.
#   - nats: UNCHANGED — still the iterion subchart's nats-io chart at
#     iterion.nats, cluster-3 JetStream fileStore.
# App tier: server x3 + HPA + soft anti-affinity + auto-PDB; runner x3 +
# auto-PDB (KEDA is NOT installed on ovh-prod → static replicas for V1). The
# `cluster:` key gates the per-env SealedSecrets (templates/*.ovh-prod.sealedsecret.yaml).
#
# --- Sealed-secret topology (created out-of-band; this overlay only references
#     them — see the secrets-spec report at handover time):
#   iterion-mongodb-creds → MONGO_INITDB_ROOT_USERNAME, MONGO_INITDB_ROOT_PASSWORD
#                          (consumed by the mongod pods at boot)
#   iterion-minio-creds   → rootUser, rootPassword
#                          (consumed by the minio pods at boot)
#   iterion-storage       → ITERION_S3_ACCESS_KEY_ID, ITERION_S3_SECRET_ACCESS_KEY
#                          (consumed by the iterion server/runner — must MATCH
#                          iterion-minio-creds so the app can talk to S3)
#   iterion-auth          → existing SealedSecret (JWT + master key + bootstrap
#                          admin) + also carries ITERION_MONGO_URI = the full
#                          credentials-bearing replicaset URI. The iterion
#                          server envFrom loads configmap → llm secret →
#                          storage secret → auth secret, so the auth secret's
#                          ITERION_MONGO_URI overrides the credential-free one
#                          in the configmap. This keeps the actual mongo
#                          credentials out of git AND out of the rendered
#                          configmap.
#   iterion-llm           → existing SealedSecret (LLM API keys, unchanged)
#
# CHANGEME — remaining V1 hardening before real traffic:
#   - pin image.tag to a digest (currently :edge),
#   - enable iterion.networkPolicy + subchart networkPolicies,
#   - JetStream stream replication R3 (iterion-side) for data-HA, not just
#     connection-HA,
#   - enable metrics.podMonitor / prometheusRule once the Prometheus operator
#     CRDs are confirmed present on ovh-prod.
cluster: ovh-prod

iterion:
  image:
    # TEMPORARY: prod tracks main via the moving :edge tag for the ADR-048
    # test→fix campaign (single operator-user on prod). Each main push rebuilds
    # :edge; a `kubectl rollout restart deploy/iterion deploy/iterion-runner`
    # pulls it fresh (pullPolicy: Always). Re-pin an immutable vX.Y.Z release
    # once the org/team tenancy rework is validated and stable.
    tag: edge
    pullPolicy: Always

  server:
    replicas: 3
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    # Soft anti-affinity: best-effort spread the server replicas across nodes
    # (preferred, not required, so a node hiccup never makes a replica
    # unschedulable). 12 nodes available.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: iterion
                  app.kubernetes.io/component: server

  runner:
    enabled: true
    replicas: 3
    keda:
      # KEDA operator installed (applications/keda.yaml). Autoscale the runner
      # pool on JetStream consumer lag: idle floor of 2 (warm pods, no cold
      # start on the first run of a burst), bursting to maxReplicas on queue
      # depth. Replaces the static replicas:3 above (the ScaledObject owns the
      # replica count once enabled).
      enabled: true
      minReplicas: 2
    sandbox:
      enabled: false
    # Devbox-first-class runner: bots `devbox run` the target repo's own
    # toolchain (cross-language/version via its devbox.json — e.g. Billy
    # building Go). Image = jetpackio/devbox base + runner toolset + iterion
    # binary, tracks :edge like the shared image. Runs as uid 1000 (the Nix
    # store is owned by `devbox`), hence the pod securityContext override.
    # Rollback: remove `image` → runner falls back to the shared lean image.
    image: ghcr.io/socialgouv/iterion-runner-devbox:edge
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        # 8Gi: a builder pod runs the target repo's full build+test suite
        # (Billy's verify gate — go test over the whole tree, node tooling);
        # 4Gi gets OOMKilled mid-verify, losing the run's banked commits
        # with the pod filesystem.
        memory: 8Gi
    # Runner Go build-cache. DISABLED: the RWX shared PVC (ADR-066 Phase 1)
    # required openebs-nfs — the ONE non-cloud-native piece — and its NFS mount
    # started FailedMount-ing, wedging runner rollouts. Reliability > cache-hit:
    # runners recompile from cold (bounded — KEDA keeps warm pods, and the image
    # bakes the go toolchain). Durable cloud-native shared cache (GOPROXY +
    # GOCACHEPROG on the already-deployed MinIO, no NFS) is the ADR-066-bis
    # follow-up. See docs/adr/066-runner-build-cache-architecture.md.
    cache:
      enabled: false

  ingress:
    enabled: true
    className: nginx
    annotations:
      # prod TLS: cert-manager issues a per-subdomain Let's Encrypt cert into
      # iterion-tls. The dev `wildcard-crt` mechanism does NOT exist on ovh-prod.
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: iterion.fabrique.social.gouv.fr
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: iterion-tls # cert-manager fills this from the letsencrypt-prod issuer
        hosts:
          - iterion.fabrique.social.gouv.fr

  config:
    # Operator timezone: log-line timestamps (server + runner) render in
    # Paris time instead of UTC (the binary embeds tzdata, chart >= 0.37.4).
    extraEnv:
      TZ: Europe/Paris
      # Sovereign web search (tier 2). SEARXNG_URL both selects the SearXNG
      # backend for the `web_search` tool AND, under the default auto mode,
      # enables the tool (reaches server + runner pods). See top-level
      # `searxng:` below and templates/searxng.yaml.
      SEARXNG_URL: http://iterion-searxng:8080
      ITERION_WEB_SEARCH: auto
      # Firecrawl (tier 3) — enable the MCP plugin on server+runner and point
      # it at the in-cluster Firecrawl. Env-based enablement (no per-pod
      # plugins.yaml). See top-level `firecrawl:` + templates/firecrawl.yaml.
      ITERION_PLUGINS_ENABLE: firecrawl
      ITERION_PLUGIN_FIRECRAWL_API_URL: http://iterion-firecrawl:3002
      # Force OpenAI via the connected ChatGPT-forfait (codex OAuth) instead of
      # the metered OPENAI_API_KEY (the platform key is quota-exhausted → 429).
      # Single-dev prod: OpenAI claw runs bill the operator's ChatGPT sub.
      ITERION_OPENAI_USE_OAUTH: "1"
    log:
      format: json
      level: info # prod: info, not debug
    mongo:
      # CREDENTIAL-FREE multi-host RS seed URI for the groundhog2k mongodb
      # chart (top-level umbrella dep). Pod DNS:
      # <fullname>-<ordinal>.<fullname>-<headlessServiceSuffix>;
      # headlessServiceSuffix defaults to "internal" → headless svc =
      # iterion-mongodb-internal. groundhog2k/mongodb in replicaSet mode
      # unconditionally enables `--keyFile` (=> requires auth), so the EFFECTIVE
      # URI must carry credentials — that creds-bearing URI lives in the
      # `iterion-auth` SealedSecret as ITERION_MONGO_URI and overrides this
      # configmap value at envFrom load time (auth secret is loaded AFTER the
      # configmap; later env wins). This no-cred URI lets a fresh helm-template
      # render without leaking secrets while still working as a fallback if the
      # auth secret were ever empty (mongo would simply reject the auth).
      uri: mongodb://iterion-mongodb-0.iterion-mongodb-internal:27017,iterion-mongodb-1.iterion-mongodb-internal:27017,iterion-mongodb-2.iterion-mongodb-internal:27017/?replicaSet=rs0
      database: iterion
    nats:
      url: nats://iterion-nats:4222
      # KEDA JetStream lag scaler scrapes the NATS HTTP monitoring port
      # (/jsz on 8222). Two gotchas pinned here:
      #  1. 8222 is exposed ONLY on the headless service (the ClusterIP
      #     `iterion-nats` publishes 4222 only).
      #  2. The KEDA operator runs in the `keda` namespace, so it must resolve
      #     the endpoint by its CROSS-NAMESPACE FQDN — a bare `iterion-nats-headless`
      #     only resolves inside `iterion` (the scaler logged
      #     "lookup iterion-nats-headless: no such host").
      monitoringEndpoint: iterion-nats-headless.iterion.svc.cluster.local:8222
    s3:
      endpoint: http://iterion-minio:9000
      region: us-east-1
      bucket: iterion-artifacts
      usePathStyle: true
    # Valkey HA (Sentinel) — shares forge OAuth/CSRF state, board-MCP tokens
    # and auth rate-limit across the x3 server replicas (fixes the GitHub-App
    # manifest "state expired" on multi-pod). Points at the valkeyha subchart's
    # sentinel service. Auth is disabled on the Valkey nodes (in-cluster,
    # ephemeral state) — same posture as no-package-malware — so no password.
    redis:
      sentinelAddrs: "iterion-valkeyha-sentinel:26379"
      masterName: mymaster
    auth:
      publicUrl: https://iterion.fabrique.social.gouv.fr
      cookieSecure: true
      # Open self-service signup: GitHub SSO (and email/password) provision a
      # new account + personal team on first login. Required for the public
      # landing's "Continue with GitHub" to work without a prior invite — under
      # invite_only a new SSO user is refused (ErrSignupClosed → login_failed).
      # Preprod stays invite_only (values.yaml).
      signupMode: open
      # GitHub SSO login provider — OAuth App "iterion" (prod) on the
      # SocialGouv org. Distinct OAuth App from preprod, so its clientId is
      # set here (not in the shared values.yaml). Client secret is
      # ITERION_OIDC_GITHUB_CLIENT_SECRET in the iterion-auth SealedSecret.
      # Callback: https://iterion.fabrique.social.gouv.fr/api/auth/oidc/github/callback
      oidc:
        github:
          clientId: "Ov23lif4EIjH5DZgzwRm"

  secrets:
    llm:
      create: false
      existingSecret: iterion-llm
    # Claude Code OAuth forfait — secret managed by hand in k8s (kubectl),
    # mounted OPTIONAL on the runner so claude_code runs on the subscription
    # instead of a metered API key. Absent secret = no-op (optional: true).
    forfait:
      enabled: true
      existingSecret: iterion-forfait
    storage:
      # Out-of-band SealedSecret carrying ITERION_S3_ACCESS_KEY_ID +
      # ITERION_S3_SECRET_ACCESS_KEY. Must MATCH the rootUser / rootPassword in
      # `iterion-minio-creds` below (the iterion server/runner uses these
      # creds to talk to MinIO).
      create: false
      existingSecret: iterion-storage
    auth:
      create: false
      existingSecret: iterion-auth # incl. ITERION_BOOTSTRAP_ADMIN_PASSWORD + ITERION_MONGO_URI
      # Gates ITERION_OIDC_GITHUB_ENABLED/CLIENT_ID in the configmap; the
      # matching client secret comes from the iterion-auth SealedSecret.
      oidc:
        github:
          enabled: true

  # --- Disable the bundled Bitnami subcharts (we drive Mongo+MinIO from the
  # umbrella deps below; NATS stays on the bundled nats-io subchart, configured
  # at iterion.nats further down). ovh-dev still gets the Bitnami subcharts via
  # values.yaml unchanged.
  mongodb:
    enabled: false
  minio:
    enabled: false

  # --- NATS stays on the bundled subchart (cluster-3 JetStream fileStore). ---
  nats:
    config:
      cluster:
        enabled: true
        replicas: 3
      jetstream:
        fileStore:
          enabled: true
          pvc:
            enabled: true
            size: 10Gi
            storageClassName: csi-cinder-high-speed
        memoryStore:
          enabled: false # prod: persistent fileStore, not memory

  metrics:
    enabled: true
    podMonitor:
      enabled: false # enable once Prometheus-operator CRDs confirmed on ovh-prod
    prometheusRule:
      enabled: false

# --- Top-level umbrella datastores (ovh-prod only) -------------------------
# These keys are siblings of `iterion:` because Chart.yaml lists `mongodb` and
# `minio` as top-level umbrella deps. The bundled Bitnami subcharts under
# `iterion.mongodb` / `iterion.minio` are disabled above. Conditions
# `mongodb.enabled` / `minio.enabled` gate them — they default to true here
# (and are absent => disabled on ovh-dev where this file isn't loaded).

mongodb:
  enabled: true
  fullnameOverride: iterion-mongodb
  # 1 primary + 2 secondaries = RS3, survives one-node loss
  replicaSet:
    enabled: true
    name: rs0
    secondaries: 2
    # Inter-node auth keyfile — RS mode REQUIRES it (an empty --keyFile makes
    # mongod reject peer auth and the RS never forms). SealedSecret with a
    # single "keyfile" key (base64 random, 6-1024 chars).
    keySecretName: iterion-mongodb-keyfile
  # Root creds come from the SealedSecret `iterion-mongodb-creds` (keys
  # MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD). With
  # settings.rootUsername / settings.rootPassword left UNSET, the groundhog2k
  # chart skips its internal createSecureConfig Secret and instead picks up
  # the env vars from the secret listed in extraEnvSecrets (rendered as
  # `envFrom: secretRef` on the mongod container).
  extraEnvSecrets:
    - iterion-mongodb-creds
  storage:
    className: sc-classic-retain # Retain reclaim → data survives PVC deletion
    requestedSize: 20Gi
  # Kyverno-restricted cluster (PSA restricted): override the chart's default
  # UID/GID 999 with the cluster-standard 1000:1000 + add seccompProfile
  # RuntimeDefault (the chart's default securityContext is otherwise compliant:
  # runAsNonRoot, allowPrivilegeEscalation: false, readOnlyRootFilesystem,
  # capabilities.drop ALL).
  podSecurityContext:
    fsGroup: 1000
    supplementalGroups:
      - 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsGroup: 1000
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

minio:
  # Official minio/minio 5.4.0 — DISTRIBUTED MULTI-NODE HA (4 nodes, 1 drive
  # per node = 4 erasure-coded drives, tolerates 2-node loss with the default
  # EC:2 parity). Single pool (default). The chart's bucket-provisioning
  # post-install Job creates iterion-artifacts.
  enabled: true
  fullnameOverride: iterion-minio
  mode: distributed
  replicas: 4
  drivesPerNode: 1
  pools: 1
  # Root creds come from the SealedSecret `iterion-minio-creds` (keys
  # `rootUser` / `rootPassword` — see secretName/existingSecret in the chart's
  # secrets.yaml + the env wiring in statefulset.yaml). The matching iterion
  # access creds live in `iterion-storage`.
  existingSecret: iterion-minio-creds
  persistence:
    enabled: true
    storageClass: csi-cinder-high-speed
    size: 20Gi
    accessMode: ReadWriteOnce
  # Auto-create the iterion-artifacts bucket via the chart's post-install
  # Job (mc make-bucket). policy=none = no anonymous access; purge=false so
  # an upgrade doesn't wipe data.
  buckets:
    - name: iterion-artifacts
      policy: none
      purge: false
  # Disable the default `console` admin user the chart provisions out of the
  # box (its plaintext password lives in values + post-Job env => sealed-only
  # rule). The MinIO Console still works with the root creds; additional users
  # can be added via a separate sealed `extraSecret` if needed.
  users: []
  # Kyverno-restricted cluster (PSA restricted): the chart's default
  # securityContext already runs as UID/GID 1000, runAsNonRoot, fsGroup 1000.
  # We just add seccompProfile RuntimeDefault on the pod and a hardened
  # containerSecurityContext (drop ALL caps, no privilege escalation,
  # runAsNonRoot) — the official chart's containerSecurityContext default is
  # `readOnlyRootFilesystem: false` only, so the other PSA-restricted knobs
  # must be set here.
  securityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: false # minio writes to /tmp + /export
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  # The post-install Job (bucket creation) must also satisfy PSA restricted —
  # enable its securityContext + restrictive containerSecurityContext.
  postJob:
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
  makeBucketJob:
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

# --- Valkey HA (Sentinel) — distributed ephemeral state (ovh-prod only) -----
# cloudpirates/valkey, the same chart no-package-malware runs in prod:
# replication + Sentinel failover. The iterion server reaches it via
# iterion.config.redis.sentinelAddrs (iterion-valkeyha-sentinel:26379). Auth
# disabled (in-cluster, ephemeral CSRF/run-token/rate-limit data). Service:
# iterion-valkeyha (data) + iterion-valkeyha-sentinel (sentinels).
valkeyha:
  enabled: true
  architecture: replication
  replicaCount: 3
  auth:
    enabled: false
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  sentinel:
    enabled: true
    masterName: mymaster
    quorum: 2
    downAfterMilliseconds: 1500
    failoverTimeout: 15000
    parallelSyncs: 1
    service:
      type: ClusterIP
      port: 26379
  # Spread Valkey pods across nodes for availability (mirrors no-package-malware).
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - valkey
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# --- SearXNG — sovereign web-search backend (tier 2, ovh-prod) --------------
# Rendered by templates/searxng.yaml, rootless. The runtime is pointed at it
# via iterion.config.extraEnv.SEARXNG_URL above (which also auto-enables the
# web_search tool). Requires the iterion-searxng SealedSecret (SEARXNG_SECRET).
searxng:
  enabled: true

# --- Firecrawl — web scrape/crawl/extract (tier 3, ovh-prod) ----------------
# 5 rootless services + Postgres PVC (templates/firecrawl.yaml). Firecrawl's
# own search delegates to the SearXNG above (SEARXNG_ENDPOINT). The runtime
# reaches it via the firecrawl MCP plugin (enabled in config.extraEnv above).
# Requires the iterion-firecrawl SealedSecret (POSTGRES_PASSWORD).
firecrawl:
  enabled: true
  postgres:
    size: 5Gi
    storageClass: csi-cinder-high-speed
