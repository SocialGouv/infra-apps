# iterion @ ovh-dev — PREPROD env (ns iterion-preprod), cloud (server + runner
# + bundled Mongo/NATS/MinIO). Tracks main via the :edge image; ovh-prod runs a
# pinned tagged release. Host: iterion-preprod.ovh.fabrique.social.gouv.fr.
# The iterion chart is pulled from oci://ghcr.io/socialgouv/charts (0.14.0) as a
# dependency, so every chart value nests under the `iterion:` key here.
#
# First cloud validation overlay: self-contained datastores in-namespace, image
# pinned to the glab+bots :edge tag, Revi (review-pr) runs in the runner pod
# (no sandbox). LLM keys come from an out-of-band Secret (iterion-llm); the JWT
# + master key from the iterion-auth SealedSecret (templates/).
iterion:
  mode: cloud

  image:
    repository: ghcr.io/socialgouv/iterion
    tag: edge # glab + bots-on-disk build; pin a digest before prod
    pullPolicy: Always

  server:
    replicas: 1
    hpa:
      enabled: false
    # Point the server's working directory at the image's bundled catalog
    # (Dockerfile `COPY bots /opt/iterion/bots`, WORKDIR is /home/iterion).
    # Without --dir the server's workdir is /home/iterion, so the marketplace
    # seeding ("bots" relative path) finds nothing and webhook-driven bot
    # launches can't resolve the catalog. Seeding only reads the bundles, so a
    # read-only /opt is fine. Mirrors the image CMD + appends --dir.
    args:
      - "server"
      - "--port"
      - "4891"
      - "--bind"
      - "0.0.0.0"
      - "--dir"
      - "/opt/iterion"

  runner:
    enabled: true
    replicas: 1
    keda:
      enabled: false
    sandbox:
      # Enabled so bots that declare `sandbox: auto` (feature-dev / whole-improve-loop /
      # branch-improve-loop — the issue-comment→improvement-MR flow) work on the k8s
      # runner. This flag gates BOTH the ITERION_POD_IP downward-API env
      # (runner-deployment, needs chart ≥ 0.15.0) AND the sandbox RBAC (runner-rbac)
      # the kubernetes sandbox driver needs to create sibling sandbox pods. review-pr
      # (Revi), which has no sandbox block, still just runs in the runner pod.
      enabled: true

  ingress:
    enabled: true
    className: nginx
    # *.ovh.fabrique dev hosts reuse the Kyverno-replicated wildcard cert
    # (ns label cert=wildcard); external-dns publishes the A record from the host.
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: iterion-preprod.ovh.fabrique.social.gouv.fr
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: wildcard-crt
        hosts:
          - iterion-preprod.ovh.fabrique.social.gouv.fr

  config:
    log:
      format: json
      level: debug
    mongo:
      uri: mongodb://iterion-mongodb-headless:27017
      database: iterion
    nats:
      url: nats://iterion-nats:4222
    s3:
      endpoint: http://iterion-minio:9000
      region: us-east-1
      bucket: iterion-artifacts
      usePathStyle: true
    # Hosted bot marketplace — public browse + .botz download + authenticated
    # submit/moderation, seeded with the image's bots/ catalog. Shared by both
    # clusters (chart ≥ 0.21.0 exposes this toggle → ITERION_CLOUD_MARKETPLACE).
    marketplace:
      enabled: true
    auth:
      publicUrl: https://iterion-preprod.ovh.fabrique.social.gouv.fr
      cookieSecure: true
      signupMode: invite_only
      # GitHub tiered access (both envs): a GitHub login matching no
      # allow-listed team is admitted as a teamless marketplace-submitter
      # instead of being refused. Per-env clientId lives in values.<env>.yaml;
      # this policy is shared. Effective only once a GitHub team grant makes
      # gating active (studio org SSO tab); until then GitHub admission still
      # follows signupMode.
      oidc:
        github:
          ungrantedPolicy: submitter

  secrets:
    llm:
      create: false
      existingSecret: iterion-llm # out-of-band (sealed real keys / placeholder)
    storage:
      create: true # bundled minio creds — internal, not real secrets
      s3AccessKeyId: minioadmin
      s3SecretAccessKey: minioadmin
    auth:
      create: false
      existingSecret: iterion-auth # SealedSecret in templates/

  mongodb:
    enabled: true
    networkPolicy:
      enabled: false # single-namespace dev stack; subchart NP would block iterion→mongo
    fullnameOverride: iterion-mongodb
    architecture: replicaset
    replicaCount: 1
    auth:
      enabled: false
    image:
      registry: docker.io
      repository: bitnamilegacy/mongodb
  nats:
    enabled: true
    fullnameOverride: iterion-nats
    config:
      jetstream:
        enabled: true
        memoryStore:
          enabled: true
          size: 1Gi
    # The cluster (Kyverno) requires runAsNonRoot, but the nats images default
    # to root → without an explicit non-root UID the pod stays in
    # CreateContainerConfigError and server+runner CrashLoop ("no servers
    # available"). Set a non-root securityContext on every nats container
    # (+ pod fsGroup so the pid / jetstream emptyDirs stay writable).
    container:
      merge:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
    reloader:
      merge:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
    podTemplate:
      merge:
        spec:
          securityContext:
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
    natsBox:
      enabled: false # debug-only nats CLI box; iterion doesn't use it (removes a non-essential, perpetually-restarting pod)
  minio:
    enabled: true
    networkPolicy:
      enabled: false
    fullnameOverride: iterion-minio
    mode: standalone
    auth:
      rootUser: minioadmin
      rootPassword: minioadmin
    defaultBuckets: iterion-artifacts
    image:
      registry: docker.io
      repository: bitnamilegacy/minio

# --- Top-level umbrella datastores (off by default; ovh-prod opts in) ------
# Chart.yaml declares `mongodb` (groundhog2k) and `minio` (official minio/minio
# in distributed HA mode) as umbrella deps gated by these top-level keys.
# ovh-dev keeps the Bitnami subcharts under `iterion.{mongodb,minio}` above;
# values.ovh-prod.yaml flips the Bitnami ones off and these two on.
mongodb:
  enabled: false
minio:
  enabled: false
# Valkey HA (Sentinel) — opted into only on ovh-prod (multi-replica). ovh-dev
# runs a single server replica, so its in-memory stores are fine.
valkeyha:
  enabled: false

# SearXNG — sovereign web-search backend (tier 2) for iterion's `web_search`
# tool (see github.com/SocialGouv/iterion docs/web-search.md). Rendered by
# templates/searxng.yaml. Off by default; each env opts in and wires the
# runtime via `iterion.config.extraEnv.SEARXNG_URL`. Needs the
# `iterion-searxng` SealedSecret (SEARXNG_SECRET) in that env's namespace.
searxng:
  enabled: false
  # image: searxng/searxng:latest
  # replicas: 1

# Firecrawl — web scrape/crawl/extract (tier 3), rendered by
# templates/firecrawl.yaml (5 rootless services + a Postgres PVC). Off by
# default; ovh-prod opts in. Reached via the `firecrawl` MCP plugin, enabled
# on the runtime through iterion.config.extraEnv (ITERION_PLUGINS_ENABLE +
# ITERION_PLUGIN_FIRECRAWL_API_URL). Needs the iterion-firecrawl SealedSecret.
firecrawl:
  enabled: false
  postgres:
    size: 5Gi
    storageClass: "" # "" → cluster default (csi-cinder-high-speed on ovh-prod)
