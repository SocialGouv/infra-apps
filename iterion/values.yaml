# iterion @ ovh-dev — PREPROD env (ns iterion-preprod), cloud (server + runner
# + bundled Mongo/NATS/MinIO). Tracks main via the :edge image; ovh-prod runs a
# pinned tagged release. Host: iterion-preprod.ovh.fabrique.social.gouv.fr.
# The iterion chart is pulled from oci://ghcr.io/socialgouv/charts (0.14.0) as a
# dependency, so every chart value nests under the `iterion:` key here.
#
# First cloud validation overlay: self-contained datastores in-namespace, image
# pinned to the glab+bots :edge tag, Revi (review-pr) runs in the runner pod
# (no sandbox). LLM keys come from an out-of-band Secret (iterion-llm); the JWT
# + master key from the iterion-auth SealedSecret (templates/).
iterion:
  mode: cloud

  image:
    repository: ghcr.io/socialgouv/iterion
    tag: edge # glab + bots-on-disk build; pin a digest before prod
    pullPolicy: Always

  server:
    replicas: 1
    hpa:
      enabled: false

  runner:
    enabled: true
    replicas: 1
    keda:
      enabled: false
    sandbox:
      # Enabled so bots that declare `sandbox: auto` (feature-dev / whole-improve-loop /
      # branch-improve-loop — the issue-comment→improvement-MR flow) work on the k8s
      # runner. This flag gates BOTH the ITERION_POD_IP downward-API env
      # (runner-deployment, needs chart ≥ 0.15.0) AND the sandbox RBAC (runner-rbac)
      # the kubernetes sandbox driver needs to create sibling sandbox pods. review-pr
      # (Revi), which has no sandbox block, still just runs in the runner pod.
      enabled: true

  ingress:
    enabled: true
    className: nginx
    # *.ovh.fabrique dev hosts reuse the Kyverno-replicated wildcard cert
    # (ns label cert=wildcard); external-dns publishes the A record from the host.
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: iterion-preprod.ovh.fabrique.social.gouv.fr
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: wildcard-crt
        hosts:
          - iterion-preprod.ovh.fabrique.social.gouv.fr

  config:
    log:
      format: json
      level: debug
    mongo:
      uri: mongodb://iterion-mongodb-headless:27017
      database: iterion
    nats:
      url: nats://iterion-nats:4222
    s3:
      endpoint: http://iterion-minio:9000
      region: us-east-1
      bucket: iterion-artifacts
      usePathStyle: true
    auth:
      publicUrl: https://iterion-preprod.ovh.fabrique.social.gouv.fr
      cookieSecure: true
      signupMode: invite_only

  secrets:
    llm:
      create: false
      existingSecret: iterion-llm # out-of-band (sealed real keys / placeholder)
    storage:
      create: true # bundled minio creds — internal, not real secrets
      s3AccessKeyId: minioadmin
      s3SecretAccessKey: minioadmin
    auth:
      create: false
      existingSecret: iterion-auth # SealedSecret in templates/

  mongodb:
    enabled: true
    networkPolicy:
      enabled: false # single-namespace dev stack; subchart NP would block iterion→mongo
    fullnameOverride: iterion-mongodb
    architecture: replicaset
    replicaCount: 1
    auth:
      enabled: false
    image:
      registry: docker.io
      repository: bitnamilegacy/mongodb
  nats:
    enabled: true
    fullnameOverride: iterion-nats
    config:
      jetstream:
        enabled: true
        memoryStore:
          enabled: true
          size: 1Gi
    # The cluster (Kyverno) requires runAsNonRoot, but the nats images default
    # to root → without an explicit non-root UID the pod stays in
    # CreateContainerConfigError and server+runner CrashLoop ("no servers
    # available"). Set a non-root securityContext on every nats container
    # (+ pod fsGroup so the pid / jetstream emptyDirs stay writable).
    container:
      merge:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
    reloader:
      merge:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
    podTemplate:
      merge:
        spec:
          securityContext:
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
    natsBox:
      enabled: false # debug-only nats CLI box; iterion doesn't use it (removes a non-essential, perpetually-restarting pod)
  minio:
    enabled: true
    networkPolicy:
      enabled: false
    fullnameOverride: iterion-minio
    mode: standalone
    auth:
      rootUser: minioadmin
      rootPassword: minioadmin
    defaultBuckets: iterion-artifacts
    image:
      registry: docker.io
      repository: bitnamilegacy/minio

# --- Top-level umbrella datastores (off by default; ovh-prod opts in) ------
# Chart.yaml declares `mongodb` (groundhog2k) and `minio` (official minio/minio
# in distributed HA mode) as umbrella deps gated by these top-level keys.
# ovh-dev keeps the Bitnami subcharts under `iterion.{mongodb,minio}` above;
# values.ovh-prod.yaml flips the Bitnami ones off and these two on.
mongodb:
  enabled: false
minio:
  enabled: false
