apiVersion: v2
name: iterion
version: 0.0.0
description: Iterion cloud (workflow engine) — server + runner + bundled Mongo/NATS/MinIO
dependencies:
  - name: iterion
    repository: oci://ghcr.io/socialgouv/charts
    # 0.35.0: KEDA runner ScaledObject supplies the required JetStream `account`
    # ($G) — without it the scaler was Ready=False and no HPA metric. 0.34.0:
    # Memory-backed emptyDir on /run/iterion for in-pod `as: file` secrets.
    # 0.33.0: ITERION_SANDBOX_OVERRIDE=none. 0.32.0: per-runner image overrides.
    version: 0.35.0
  # Valkey HA (Sentinel) — distributed ephemeral state for the multi-replica
  # server. cloudpirates/valkey (architecture: replication + sentinel), the
  # same chart no-package-malware runs in prod. ovh-prod opts in via
  # `valkeyha.enabled`; ovh-dev (single replica) stays in-memory.
  - alias: valkeyha
    name: valkey
    repository: https://cloudpirates-io.github.io/helm-charts
    version: 0.10.3
    condition: valkeyha.enabled
  # --- ovh-prod community datastores (replace the iterion subchart's deprecated
  # Bitnami mongodb+minio). Their values live at top-level `mongodb:` / `minio:`
  # (distinct from `iterion.mongodb` / `iterion.minio` which gate the bundled
  # Bitnami subcharts — disabled in values.ovh-prod.yaml).
  # ovh-dev keeps the Bitnami subcharts on (conditions below stay false there).
  - name: mongodb
    repository: https://groundhog2k.github.io/helm-charts/
    version: 0.7.8
    condition: mongodb.enabled
  - name: minio
    repository: https://charts.min.io/
    version: 5.4.0
    condition: minio.enabled
