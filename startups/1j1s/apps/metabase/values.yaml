metabase:
  enabled: true
  fullnameOverride: metabase
  cnpg-cluster:
    annotations:
      # 1 CPU request (oblik ratio 2 => 2 CPU limit): below this the instance
      # manager gets CPU-throttled during WAL-replay/recovery load and fails
      # its liveness probe, putting the instance in a restart loop
      oblik.socialgouv.io/min-request-cpu: "1"
    persistence:
      size: 32Gi
    backup:
      enabled: true
      barmanObjectStore:
        destinationPath: s3://1j1s-prod-backups/metabase
        endpointURL: https://s3.gra.io.cloud.ovh.net
        s3Credentials:
          accessKeyId:
            name: &s3secretName 1j1s-prod-backups-access-key
          region:
            name: *s3secretName
          secretAccessKey:
            name: *s3secretName

metabase-matomo-sync:
  enabled: true
  fullnameOverride: metabase-matomo-sync
  cnpg-cluster:
    persistence:
      size: 40Gi
    backup:
      enabled: true
      barmanObjectStore:
        destinationPath: s3://1j1s-prod-backups/metabase-matomo-sync-20241219
        endpointURL: https://s3.gra.io.cloud.ovh.net
        s3Credentials:
          accessKeyId:
            name: &s3secretName 1j1s-prod-backups-access-key
          region:
            name: *s3secretName
          secretAccessKey:
            name: *s3secretName

metabase-matomo-sync-back:
  enabled: true
  fullnameOverride: metabase-matomo-sync-back
  pgdatabase:
    # base commune matomo-sync
    secretName: metabase-matomo-sync-app
  cnpg-cluster:
    enabled: false
