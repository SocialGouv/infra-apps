# Per-project tuning of iterion's buildkit-operator daemons (ovh-prod).
#
# buildd auto-creates BuildProjects with CRD defaults on the first /route and
# its Ensure is create-only — so these committed CRs are authoritative: Argo
# applies them over (or ahead of) the auto-created ones, and the operator
# reconciles the daemons from their spec.
#
# metadata.name is the router key: "p" + sha256(seed)[:16] with
#   seed = "github.com/socialgouv/iterion" + "\x00n:" + <spec.name>
#          + "\x00default\x00amd64"
# (see internal/router/router.go ProjectKey in socialgouv/buildkit-operator).
# If a routing-name changes in iterion's workflows, recompute the key.
#
# Tuning rationale (2026-07-22):
# - iterion, iterion-runner-devbox and iterion-sandbox-finalize build on EVERY
#   main push. tier=hot keeps their daemons resident: the measured cost of a
#   cold reattach on the app image is ~8.6 min vs ~0.8 min warm, and the
#   default warm tier scales to zero after only 15 min idle.
# - iterion-sandbox-base hosts the whole slim/full/sec/browser tool-base chain
#   on one shared daemon (iterion's sandbox-images.yml routes all four bases
#   there). 120Gi keeps the four-variant layer set + cache mounts under the
#   85% GC ceiling; 1h idle covers clustered rebuild sessions. NOTE: the PVC
#   of an ALREADY-provisioned daemon is not resized by the operator
#   (volumeClaimTemplates are immutable) — expand it once by hand:
#   kubectl -n buildkit-builds patch pvc cache-buildkitd-p10deda8d046b6a63-0 \
#     -p '{"spec":{"resources":{"requests":{"storage":"120Gi"}}}}'
apiVersion: buildkit-operator.socialgouv.github.io/v1alpha1
kind: BuildProject
metadata:
  name: p2734885c8a2107c8
  namespace: buildkit-builds
spec:
  key: p2734885c8a2107c8
  arch: amd64
  repo: github.com/socialgouv/iterion
  name: iterion
  target: default
  tier: hot
---
apiVersion: buildkit-operator.socialgouv.github.io/v1alpha1
kind: BuildProject
metadata:
  name: p5edae6767d86e70a
  namespace: buildkit-builds
spec:
  key: p5edae6767d86e70a
  arch: amd64
  repo: github.com/socialgouv/iterion
  name: iterion-runner-devbox
  target: default
  tier: hot
---
apiVersion: buildkit-operator.socialgouv.github.io/v1alpha1
kind: BuildProject
metadata:
  name: p9d9bf96b5035f99a
  namespace: buildkit-builds
spec:
  key: p9d9bf96b5035f99a
  arch: amd64
  repo: github.com/socialgouv/iterion
  name: iterion-sandbox-finalize
  target: default
  tier: hot
---
apiVersion: buildkit-operator.socialgouv.github.io/v1alpha1
kind: BuildProject
metadata:
  name: p10deda8d046b6a63
  namespace: buildkit-builds
spec:
  key: p10deda8d046b6a63
  arch: amd64
  repo: github.com/socialgouv/iterion
  name: iterion-sandbox-base
  target: default
  tier: warm
  idleTimeoutSec: 3600
  cacheVolumeGi: 120
