elasticsearch:
  name: cdtn-es
  version: 8.12.0

  # default shape; envs can override
  replicas: 1
  storage: 50Gi

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "4Gi"

  config:
    node.store.allow_mmap: false

kibana:
  enabled: false
  name: cdtn-kibana
  version: 8.12.0
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  ingress:
    enabled: false
    host: ""
    tlsSecretName: wildcard-crt
    annotations: {}

final-appset:
  namespace:
    annotations: {}
    labels: {}