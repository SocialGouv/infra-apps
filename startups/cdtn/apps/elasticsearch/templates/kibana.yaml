{{- if .Values.kibana.enabled }}
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: {{ .Values.kibana.name }}
  labels:
    app.kubernetes.io/name: cdtn-kibana
    app.kubernetes.io/part-of: cdtn
spec:
  version: {{ .Values.kibana.version | quote }}
  count: {{ .Values.kibana.replicas }}
  elasticsearchRef:
    name: {{ .Values.elasticsearch.name }}
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
{{ toYaml .Values.kibana.resources | indent 12 }}
{{- end }}
