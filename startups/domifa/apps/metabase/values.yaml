metabase:
  enabled: true
  image:
    tag: v0.58.7.2

  fullnameOverride: metabase
  cnpg-cluster:
    backup:
      enabled: true
      barmanObjectStore:
        destinationPath: s3://domifa-dev-backups/metabase-dev
        endpointURL: https://s3.gra.io.cloud.ovh.net
        s3Credentials:
          accessKeyId:
            name: &s3secretName domifa-dev-backups-access-key
          region:
            name: *s3secretName
          secretAccessKey:
            name: *s3secretName

oauth2-proxy:
  fullnameOverride: oauth2-proxy
  enabled: true
  upstream: http://metabase
  envFrom:
    - configMapRef:
        name: oauth2-proxy-configmap
    - secretRef:
        name: oauth2-proxy-sealed-secret
  additionalArgs:
    - --skip-auth-route
    - ^/public/.*,^/app/dist/.*,^/api/public/.*,^/api/session/.*,^/app/assets/.*
