metabase:
  host: &metabaseHost metabase-prod-domifa.ovh.fabrique.social.gouv.fr
  annotations:
    oblik.socialgouv.io/min-request-cpu: "1"
  ingress:
    enabled: false
  cnpg-cluster:
    backup:
      enabled: true
      barmanObjectStore:
        destinationPath: s3://domifa-prod-backups/metabase-20240712
        endpointURL: https://s3.gra.io.cloud.ovh.net
        s3Credentials:
          accessKeyId:
            name: &s3secretName domifa-prod-backups-access-key
          region:
            name: *s3secretName
          secretAccessKey:
            name: *s3secretName

oauth2-proxy:
  host: *metabaseHost
  ingress:
    annotations:
      cert-manager.io: cluster-issuer
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/tls-acme: "true"

final-appset:
  importSecretsFromStartup: true
