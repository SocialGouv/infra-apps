apiVersion: apps/v1
kind: Deployment
metadata:
  name: huginn-worker
  labels:
    app.kubernetes.io/name: huginn
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: huginn
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: huginn
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        - name: wait-for-pg
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at pg-rw:5432..."
              until nc -z pg-rw 5432; do
                echo "PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/scripts/init", "bin/threaded.rb"]
          envFrom:
            - configMapRef:
                name: huginn-env
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pg-app
                  key: uri
            - name: APP_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: APP_SECRET_TOKEN
            - name: INVITATION_CODE
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: INVITATION_CODE
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
