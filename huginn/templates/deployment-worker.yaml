apiVersion: apps/v1
kind: Deployment
metadata:
  name: huginn-worker
  labels:
    app.kubernetes.io/name: huginn
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: huginn
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: huginn
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/scripts/init", "bin/threaded.rb"]
          envFrom:
            - configMapRef:
                name: huginn-env
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pg-app
                  key: uri
            - name: APP_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: APP_SECRET_TOKEN
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
