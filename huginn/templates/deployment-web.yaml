apiVersion: apps/v1
kind: Deployment
metadata:
  name: huginn-web
  labels:
    app.kubernetes.io/name: huginn
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: huginn
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: huginn
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        - name: wait-for-pg
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at pg-rw:5432..."
              until nc -z pg-rw 5432; do
                echo "PostgreSQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: huginn-env
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pg-app
                  key: uri
            - name: APP_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: APP_SECRET_TOKEN
            - name: INVITATION_CODE
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: INVITATION_CODE
            - name: SMTP_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: SMTP_USER_NAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: SMTP_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: huginn-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
