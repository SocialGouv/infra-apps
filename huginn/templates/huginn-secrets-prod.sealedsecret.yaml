{{- if eq .Values.cluster "ovh-prod" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: huginn-secrets
  namespace: huginn
spec:
  encryptedData:
    APP_SECRET_TOKEN: 
    INVITATION_CODE: 
    OPENAI_API_KEY: 
    SMTP_PASSWORD: 
    SMTP_USER_NAME: 
  template:
    metadata:
      name: huginn-secrets
      namespace: huginn
{{- end }}
